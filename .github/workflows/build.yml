name: Build AirPodsVolume

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recurse-submodules https://github.com/theos/theos.git ${{ runner.temp }}/theos
          find ${{ runner.temp }}/theos/bin -name "*.pl" -exec sed -i '' '1s|#!/usr/bin/perl|#!/usr/bin/env perl|' {} \;
          echo "THEOS=${{ runner.temp }}/theos" >> $GITHUB_ENV
          echo "THEOS_PACKAGE_SCHEME=rootless" >> $GITHUB_ENV

      - name: Install dependencies
        run: brew install dpkg ldid

      - name: Install SDK
        run: |
          cd ${{ runner.temp }}/theos/sdks
          curl -sLO https://github.com/theos/sdks/archive/refs/heads/master.zip
          unzip -q master.zip
          mv sdks-master/iPhoneOS16.5.sdk .
          rm -rf sdks-master master.zip

      - name: Build
        run: make package

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: AirPodsVolume-rootless
          path: packages/*.deb
